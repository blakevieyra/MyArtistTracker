#### PORT CONFIG ####
server.port=${PORT:8083}

#### DATASOURCE (override via env vars for Render/production) ####
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/artiststrackerdb?useSSL=false&&useLegacyDatetimeCode=false&serverTimezone=US/Mountain}
spring.datasource.username=${DATABASE_USERNAME:artistsuser}
spring.datasource.password=${DATABASE_PASSWORD:artistsuser}
spring.datasource.driver-class-name=${DATABASE_DRIVER:com.mysql.cj.jdbc.Driver}

#### JPA / Hibernate ####
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:none}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:}

spring.jmx.default-domain=RESTArtistsTracker