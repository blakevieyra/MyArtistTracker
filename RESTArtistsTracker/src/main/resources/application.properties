#### PORT CONFIG ####
server.port=${PORT:8083}

#### DATASOURCE ####
# Local dev uses MySQL. On Render, the docker-entrypoint.sh sets
# SPRING_DATASOURCE_URL/USERNAME/PASSWORD/DRIVER_CLASS_NAME which override these.
spring.datasource.url=jdbc:mysql://localhost:3306/artiststrackerdb?useSSL=false&&useLegacyDatetimeCode=false&serverTimezone=US/Mountain
spring.datasource.username=artistsuser
spring.datasource.password=artistsuser
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jmx.default-domain=RESTArtistsTracker