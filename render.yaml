databases:
  - name: artiststracker-db
    plan: free
    databaseName: artiststrackerdb
    user: artistsuser

services:
  # Spring Boot Backend API
  - type: web
    name: artiststracker-api
    runtime: docker
    plan: free
    dockerfilePath: ./RESTArtistsTracker/Dockerfile
    dockerContext: .
    healthCheckPath: /authenticate
    envVars:
      - key: PORT
        value: 8083
      - key: DB_HOST
        fromDatabase:
          name: artiststracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: artiststracker-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: artiststracker-db
          property: database
      - key: DATABASE_USERNAME
        fromDatabase:
          name: artiststracker-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: artiststracker-db
          property: password

  # Angular Frontend (static site served via Docker/nginx)
  - type: web
    name: artiststracker-frontend
    runtime: static
    buildCommand: cd ngArtistsTracker && npm ci && npx ng build --configuration production
    staticPublishPath: ./ngArtistsTracker/dist/ng-artists-tracker/browser
    routes:
      - type: rewrite
        source: /api/*
        destination: https://artiststracker-api.onrender.com/api/*
      - type: rewrite
        source: /register
        destination: https://artiststracker-api.onrender.com/register
      - type: rewrite
        source: /authenticate
        destination: https://artiststracker-api.onrender.com/authenticate
      - type: rewrite
        source: /*
        destination: /index.html
